name: Node.js CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:

        runs-on: ubuntu-latest

        steps:

        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'

        - name: Install dependencies
          run: npm ci

        - name: Run build
          run: npm run build
          env:
            # Inject a dummy placeholder to pass the validation scripts
            DATABASE_URL: postgresql://dummy_user:dummy_pass@localhost:5432/dummy_db